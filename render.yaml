services:
  - type: web
    name: quiz-app-backend
    runtime: python3
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn --config gunicorn.conf.py app:app
    plan: starter  # Change to 'free' for free tier (has limitations)
    region: oregon  # Change to your preferred region
    branch: main
    rootDir: .
    envVars:
      - key: SUPABASE_URL
        sync: false  # Set this manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false  # Set this manually in Render dashboard  
      - key: SECRET_KEY
        generateValue: true  # Render will generate a random secret
      - key: PORT
        value: 10000

  - type: static
    name: quiz-app-frontend
    buildCommand: echo "No build needed for static files"
    staticPublishPath: ./frontend
    plan: free
    region: oregon
    branch: main
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff